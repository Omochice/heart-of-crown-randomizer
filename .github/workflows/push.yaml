name: Check files

on:
  push: null
  pull_request:
    branches:
      - main

jobs:
  path-filter:
    timeout-minutes: 5
    outputs:
      ts: ${{steps.changes.outputs.ts}}
      adr: ${{steps.changes.outputs.adr}}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          filters: |
            ts:
              - .github/workflows/*.yaml
              - pnpm-lock.yaml
              - pnpm-workspace.yaml
              - turbo.json
              - biome.json
              - ./**/package.json
              - ./**/tsconfig.json
              - ./**/vite.config.ts
              - packages/**/*
            adr:
              - .kiro/specs/*/architecture-decision-record.md
              - pnpm-lock.yaml
  nix-flake-check:
    needs: path-filter
    timeout-minutes: 5
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix flake check
  check-typescript:
    needs: path-filter
    if: needs.path-filter.outputs.ts == 'true'
    permissions:
      contents: read
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["24.14.1", "current"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install
      - run: pnpm run check
      - run: pnpm run test
      - run: pnpm --filter=@heart-of-crown-randomizer/site exec playwright install
      - run: pnpm --filter ./packages/site run test:e2e
  check-adr:
    name: Check architecture decision record format
    needs: path-filter
    permissions:
      contents: read
    timeout-minutes: 5
    runs-on: ubuntu-latest
    if: needs.path-filter.outputs.adr == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec textlint .kiro/specs/*/architecture-decision-record.md
  status-check:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs:
      - nix-flake-check
      - check-typescript
      - check-adr
    permissions: {}
    if: failure()
    steps:
      - run: exit 1
